version: '3.8'

services:
  # The FastAPI Scanning Engine (Backend)
  api:
    build: .
    container_name: gemini_mlops_backend
    ports:
      - "8000:8000"
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1

  # The Streamlit CISO Dashboard (Frontend)
  dashboard:
    build: .
    container_name: gemini_mlops_frontend
    ports:
      - "8501:8501"
    command: streamlit run app.py
    volumes:
      - .:/app
    environment:
      - FASTAPI_URL=http://api:8000
      - PYTHONUNBUFFERED=1
    depends_on:
      - api
