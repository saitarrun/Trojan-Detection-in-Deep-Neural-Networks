apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trojan-detection-pvc
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: trojan-detection-dev
  labels:
    app: trojan-detection
spec:
  containers:
  - name: pytorch-dev
    image: pytorch/pytorch:latest
    command: ["sh", "-c", "apt-get update && apt-get install -y openssh-server && mkdir /var/run/sshd && /usr/sbin/sshd -D"]
    ports:
    - containerPort: 22
    volumeMounts:
    - mountPath: /workspace
      name: trojan-detection-vol
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: "16Gi"
        cpu: "4"
      requests:
        nvidia.com/gpu: 1
        memory: "8Gi"
        cpu: "2"
  volumes:
  - name: trojan-detection-vol
    persistentVolumeClaim:
      claimName: trojan-detection-pvc
